services:
  - type: web
    name: phishing-detection-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python train/train_url_model.py && python train/train_sms_model.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGODB_URI
        sync: false
      - key: DB_NAME
        value: phishing_detection
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
